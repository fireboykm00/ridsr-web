<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900">
    <stop offset="0%" stop-color="#F8FAFC"/>
    <stop offset="100%" stop-color="#EEF2F7"/>
  </linearGradient>

  <pattern id="imigongoPattern" patternUnits="userSpaceOnUse" width="160" height="160">

    <!-- outer diamond -->
    <path d="M80 10 L150 80 L80 150 L10 80 Z" 
          stroke="#23408E" stroke-width="1.2" fill="none" opacity="0.18"/>

    <!-- middle diamond -->
    <path d="M80 30 L130 80 L80 130 L30 80 Z" 
          stroke="#9CA3AF" stroke-width="1" fill="none" opacity="0.18"/>

    <!-- inner diamond -->
    <path d="M80 50 L110 80 L80 110 L50 80 Z" 
          stroke="#D1D5DB" stroke-width="0.8" fill="none" opacity="0.18"/>

  </pattern>
</defs>

<!-- background -->
<rect width="1600" height="900" fill="url(#bg)"/>

<!-- pattern -->
<rect width="1600" height="900" fill="url(#imigongoPattern)"/>

</svg>
